name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            make \
            gcc \
            pkg-config \
            libbpf-dev

      - name: Sanity check runner prerequisites
        run: |
          set -euo pipefail
          command -v clang
          command -v cc
          command -v make

      - name: Build userspace binaries
        run: |
          set -euo pipefail
          make clean
          make build/knockd build/knock-client
