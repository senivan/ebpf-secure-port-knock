name: Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  e2e-regression:
    name: e2e-regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            make \
            gcc \
            pkg-config \
            libbpf-dev \
            iproute2 \
            openssh-client \
            openssh-server

          if ! command -v bpftool >/dev/null 2>&1; then
            # On some Ubuntu images bpftool is virtual; linux-tools-common provides it.
            sudo apt-get install -y linux-tools-common
          fi

          command -v bpftool >/dev/null 2>&1

      - name: Sanity check runner prerequisites
        run: |
          set -euo pipefail
          test -r /sys/kernel/btf/vmlinux
          command -v clang
          command -v bpftool
          command -v ip
          command -v ssh
          command -v ssh-keygen

      - name: Build
        run: |
          set -euo pipefail
          make clean
          make all

      - name: Run smoke regression (loopback)
        run: |
          set -euo pipefail
          sudo make test

      - name: Run netns regression
        run: |
          set -euo pipefail
          sudo make test-netns

      - name: Detect SSH test prerequisites
        id: ssh_prereq
        run: |
          set -euo pipefail

          if [[ ! -x /usr/sbin/sshd ]]; then
            echo "run_ssh=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing /usr/sbin/sshd" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ssh_user="${SUDO_USER:-}"
          if [[ -z "$ssh_user" || "$ssh_user" == "root" ]]; then
            ssh_user="$(awk -F: '$3 >= 1000 && $1 != "nobody" { print $1; exit }' /etc/passwd)"
          fi

          if [[ -z "$ssh_user" ]]; then
            echo "run_ssh=false" >> "$GITHUB_OUTPUT"
            echo "reason=no non-root local user found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! id "$ssh_user" >/dev/null 2>&1; then
            echo "run_ssh=false" >> "$GITHUB_OUTPUT"
            echo "reason=discovered SSH user does not exist: $ssh_user" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_ssh=true" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$ssh_user" >> "$GITHUB_OUTPUT"

      - name: Run SSH regression
        if: steps.ssh_prereq.outputs.run_ssh == 'true'
        run: |
          set -euo pipefail
          sudo SSH_TEST_USER="${{ steps.ssh_prereq.outputs.ssh_user }}" make test-ssh

      - name: Note SSH regression skip reason
        if: steps.ssh_prereq.outputs.run_ssh != 'true'
        run: |
          echo "SSH regression skipped: ${{ steps.ssh_prereq.outputs.reason }}"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          set -euo pipefail
          out_dir=/tmp/knock-ci-diagnostics
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          cp -f /tmp/knockd_*_test.log "$out_dir" 2>/dev/null || true
          cp -f /tmp/knock_client_*_test.log "$out_dir" 2>/dev/null || true

          sudo bpftool map dump pinned /sys/fs/bpf/knock_gate/stats_map > "$out_dir/stats_map.txt" 2>&1 || true
          sudo bpftool map dump pinned /sys/fs/bpf/knock_gate/debug_knock_map > "$out_dir/debug_knock_map.txt" 2>&1 || true
          sudo dmesg | tail -n 200 > "$out_dir/dmesg_tail.txt" 2>&1 || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knock-regression-diagnostics
          path: /tmp/knock-ci-diagnostics
          if-no-files-found: warn
          retention-days: 7
