version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=replace-this-password
      - SECRET_KEY=replace-this-secret-key
      - JWT_SECRET_KEY=replace-this-jwt-secret
      - API_PORT=5000
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf:ro
    networks:
      - knock-network
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    networks:
      - knock-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=knock_admin
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=changeme123
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - knock-network
    restart: unless-stopped

networks:
  knock-network:
    driver: bridge

volumes:
  db_data:
